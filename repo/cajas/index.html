<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cofres · Lemon</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="fonts/lemon-icons.css" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; background: #E6E5E1; overflow-x: hidden; }
  body { font-family: Inter, system-ui, sans-serif; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes lcspin { to { transform: rotate(360deg); } }
  @keyframes lc-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes lc-shine { 0% { transform: translateX(-160%) skewX(-14deg); } 60%,100% { transform: translateX(460%) skewX(-14deg); } }
  @keyframes lc-pop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes lc-coin-drop { 0% { transform: translateY(-26px); opacity: 0; } 55% { opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
  @keyframes lc-coin-fall { 0% { transform: translateY(-64px) scale(0.7); opacity: 0; } 40% { opacity: 1; } 68% { transform: translateY(0) scale(1); } 82% { transform: translateY(-7px); } 100% { transform: translateY(0); } }
  @keyframes lc-box-squash { 0%, 56% { transform: none; } 70% { transform: scaleY(0.93) translateY(4px); } 86% { transform: scaleY(1.03); } 100% { transform: none; } }
  @keyframes lc-confetti { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity: 0; } }
  .lc-spin { animation: lcspin 0.9s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="lemon-ui.jsx"></script>
<script type="text/babel" src="screens-shared.jsx"></script>
<script type="text/babel" src="cajas-ui.jsx"></script>
<script type="text/babel" src="cajas-screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
