<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tus gastos · Lemon</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="fonts/lemon-icons.css" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { margin: 0; padding: 0; background: #E6E5E1; overflow-x: hidden; }
  body { font-family: Inter, system-ui, sans-serif; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes screenIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes lcspin { to { transform: rotate(360deg); } }
  @keyframes lc-skel { 0% { opacity: 0.55; } 50% { opacity: 1; } 100% { opacity: 0.55; } }
  @keyframes lc-pop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes lc-grow-y { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes lc-grow-x { from { transform: scaleX(0.12); } to { transform: scaleX(1); } }
  @keyframes lc-coin-drop { 0% { transform: translateY(-26px); opacity: 0; } 55% { opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
  @keyframes lc-toast { 0% { transform: translateY(16px); opacity: 0; } 100% { transform: none; opacity: 1; } }
  @keyframes lc-shine { 0% { transform: translateX(-160%) skewX(-14deg); } 60%, 100% { transform: translateX(460%) skewX(-14deg); } }
  .lc-spin { animation: lcspin 0.9s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
// dev: los .jsx se cargan con versión dinámica para que el navegador
// nunca ejecute una copia cacheada vieja (babel los baja por XHR)
(function () {
  var v = Date.now();
  ['ios-frame.jsx', 'lemon-ui.jsx', 'gastos-data.jsx', 'gastos-ui.jsx', 'gastos-screens.jsx', 'app-shell.jsx', 'app.jsx']
    .forEach(function (f) { document.write('<scr' + 'ipt type="text/babel" src="' + f + '?v=' + v + '"></scr' + 'ipt>'); });
})();
</script>
</body>
</html>
